<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Omid reza</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(
135deg,
#0f172a,
#111827,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:40px 25px;

overflow-y:auto;
overflow-x:hidden;

}

@keyframes bgMove{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

body::before{

content:"";

position:fixed;

width:320px;
height:320px;

background:#00d4ff55;

border-radius:50%;

top:-120px;
left:-120px;

filter:blur(80px);

}

body::after{

content:"";

position:fixed;

width:350px;
height:350px;

background:#7c3aed55;

border-radius:50%;

bottom:-150px;
right:-120px;

filter:blur(90px);

}

.card{

position:relative;

width:370px;

padding:35px;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 25px 50px rgba(0,0,0,.45);

text-align:center;

z-index:10;

}

.profile{

width:155px;

height:155px;

border-radius:50%;

object-fit:cover;

border:4px solid rgba(255,255,255,.9);

box-shadow:
0 15px 35px rgba(0,0,0,.35);

}

h1{

margin-top:20px;

color:#fff;

font-size:28px;

font-weight:600;

}

.social{

display:flex;

align-items:center;

justify-content:center;

gap:14px;

margin-top:20px;

padding:16px;

border-radius:18px;

background:rgba(255,255,255,.08);

color:#fff;

text-decoration:none;

font-size:17px;

font-weight:500;

transition:.30s;

}

.social:hover{

transform:translateY(-5px);

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

.social i{

font-size:22px;

width:28px;

}

.soroush{
background:#00AEEF;
}

.bale{
background:#0084FF;
}

.social:hover i{

transform:scale(1.15);

transition:.3s;

}

</style>

</head>

<body>

<div class="card">

<img src="profile.png" alt="Profile" class="profile">

<h1>Omid reza</h1>

<a class="social soroush"
href="https://splus.ir/rtt12"
target="_blank">

<i class="fa-solid fa-comment-dots"></i>

<span>Soroush</span>

</a>

<a class="social bale"
href="https://ble.ir/kapetan12"
target="_blank">

<i class="fa-solid fa-comment"></i>

<span>Bale</span>

</a>

</div>

</body>

</html>
